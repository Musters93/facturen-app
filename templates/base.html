<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Facturatie{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; background-color:#f7f7f7; color:#333; }
        nav { background-color:#3498db; padding:10px 20px; color:white; display:flex; align-items:center; }
        nav a { color:white; text-decoration:none; margin-right:20px; font-weight:bold; }
        nav a:hover { text-decoration:underline; }
        main { margin:30px; }
        h1, h2 { color:#2c3e50; }
        form { background-color:#fff; padding:25px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); max-width:800px; margin-bottom:30px; }
        label { display:block; margin-top:15px; font-weight:bold; }
        input[type="text"], input[type="number"], select, textarea { width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:4px; font-family:inherit; font-size:14px; box-sizing:border-box; }
        textarea { resize:vertical; }
        button { margin-top:25px; padding:12px 20px; background-color:#3498db; color:white; border:none; border-radius:4px; cursor:pointer; font-size:16px; }
        button:hover { background-color:#2980b9; }
        table { border-collapse: collapse; width: 100%; margin-top:20px; }
        th, td { border:1px solid #ccc; padding:8px; text-align:left; }
        th { background-color:#eee; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/admin">Admin Overzicht</a>
        <a href="/admin/query">SQL Console</a>
        <a href="/result">Resultaten</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
